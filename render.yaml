services:
  - type: web
    name: coding-mentor-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
